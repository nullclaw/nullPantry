name: Contracts

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-import:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-zig
        with:
          version: "0.16.0"
      - run: zig build check-full-import -Dengine-profile=full --summary all
      - run: zig build test-profile -Dengine-profile=full --summary all

  postgres-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nullpantry
          POSTGRES_PASSWORD: nullpantry
          POSTGRES_DB: nullpantry_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nullpantry -d nullpantry_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-zig
        with:
          version: "0.16.0"
      - run: zig build postgres-contract --summary all
        env:
          NULLPANTRY_TEST_POSTGRES_URL: postgres://nullpantry:nullpantry@127.0.0.1:5432/nullpantry_test
      - run: zig build pgvector-contract --summary all
        env:
          NULLPANTRY_TEST_PGVECTOR_URL: postgres://nullpantry:nullpantry@127.0.0.1:5432/nullpantry_test

  redis-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-zig
        with:
          version: "0.16.0"
      - run: zig build redis-contract --summary all
        env:
          NULLPANTRY_TEST_REDIS_URL: redis://127.0.0.1:6379/0

  qdrant-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      qdrant:
        image: qdrant/qdrant:v1.14.1
        ports:
          - 6333:6333
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-zig
        with:
          version: "0.16.0"
      - run: |
          for _ in {1..30}; do
            curl -fsS http://127.0.0.1:6333/healthz && exit 0
            sleep 1
          done
          exit 1
      - run: zig build qdrant-contract --summary all
        env:
          NULLPANTRY_TEST_QDRANT_URL: http://127.0.0.1:6333

  lancedb-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-zig
        with:
          version: "0.16.0"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install lancedb
      - run: |
          NULLPANTRY_TEST_LANCEDB_COMMAND="$(python -c 'import sys; print(sys.executable)')" \
          zig build lancedb-contract --summary all
        env:
          NULLPANTRY_TEST_LANCEDB_URI: ${{ runner.temp }}/nullpantry-lancedb

  clickhouse-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.8
        ports:
          - 8123:8123
        env:
          CLICKHOUSE_SKIP_USER_SETUP: 1
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-zig
        with:
          version: "0.16.0"
      - run: |
          for _ in {1..60}; do
            curl -fsS http://127.0.0.1:8123/ping && exit 0
            sleep 1
          done
          exit 1
      - run: zig build clickhouse-contract --summary all
        env:
          NULLPANTRY_TEST_CLICKHOUSE_URL: http://127.0.0.1:8123

  lucid-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-zig
        with:
          version: "0.16.0"
      - run: zig build lucid-contract --summary all
