name: Nightly

on:
  schedule:
    - cron: "23 2 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Build even if this commit already has a successful nightly run.
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nightly:
    uses: nullclaw/nullbuilder/.github/workflows/zig-nightly.yml@v1
    permissions:
      actions: read
      contents: write
    with:
      binary_name: nullpantry
      artifact_prefix: nullpantry
      zig_version: "0.16.0"
      targets_json: >-
        [
          {"os":"ubuntu-latest","target":"linux-x86_64","zig_target":"x86_64-linux-musl","zig_cpu":"","ext":""},
          {"os":"ubuntu-latest","target":"linux-aarch64","zig_target":"aarch64-linux-musl","zig_cpu":"","ext":""},
          {"os":"ubuntu-latest","target":"linux-riscv64","zig_target":"riscv64-linux-musl","zig_cpu":"","ext":""},
          {"os":"macos-latest","target":"macos-aarch64","zig_target":"aarch64-macos","zig_cpu":"","ext":""},
          {"os":"macos-latest","target":"macos-x86_64","zig_target":"x86_64-macos","zig_cpu":"","ext":""},
          {"os":"windows-2025-vs2026","target":"windows-x86_64","zig_target":"x86_64-windows","zig_cpu":"","ext":".exe"},
          {"os":"windows-2025-vs2026","target":"windows-aarch64","zig_target":"aarch64-windows","zig_cpu":"","ext":".exe"}
        ]
      publish_release: true
      release_tag: nightly
      release_title: NullPantry Nightly
      force: ${{ inputs.force || false }}
