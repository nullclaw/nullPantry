name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline:
    name: baseline / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux
            os: ubuntu-latest
          - target: macos
            os: macos-latest
          - target: windows
            os: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-zig
        with:
          version: "0.16.0"
      - name: Run baseline tests
        run: zig build test --summary all
      - name: Compile default binary
        run: zig build --summary all
