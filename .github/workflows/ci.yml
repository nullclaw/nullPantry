name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  zig:
    uses: nullclaw/nullbuilder/.github/workflows/zig-ci.yml@v1
    permissions:
      contents: read
    with:
      binary_name: nullpantry
      artifact_prefix: nullpantry
      zig_version: "0.16.0"
      test_command: zig build test --summary all
      targets_json: >-
        [
          {"os":"ubuntu-latest","target":"linux-x86_64","zig_target":"x86_64-linux-musl"},
          {"os":"ubuntu-latest","target":"linux-aarch64","zig_target":"aarch64-linux-musl"},
          {"os":"macos-latest","target":"macos-aarch64","zig_target":"aarch64-macos"},
          {"os":"windows-latest","target":"windows-x86_64","zig_target":"x86_64-windows"}
        ]

  full-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"
      - run: zig build check-full-import -Dengine-profile=full --summary all
      - run: zig build test-profile -Dengine-profile=full --summary all

  postgres-contract:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nullpantry
          POSTGRES_PASSWORD: nullpantry
          POSTGRES_DB: nullpantry_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nullpantry -d nullpantry_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"
      - run: zig build postgres-contract --summary all
        env:
          NULLPANTRY_TEST_POSTGRES_URL: postgres://nullpantry:nullpantry@127.0.0.1:5432/nullpantry_test
      - run: zig build pgvector-contract --summary all
        env:
          NULLPANTRY_TEST_PGVECTOR_URL: postgres://nullpantry:nullpantry@127.0.0.1:5432/nullpantry_test

  redis-contract:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"
      - run: zig build redis-contract --summary all
        env:
          NULLPANTRY_TEST_REDIS_URL: redis://127.0.0.1:6379/0

  qdrant-contract:
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:v1.14.1
        ports:
          - 6333:6333
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"
      - run: |
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:6333/healthz && exit 0
            sleep 1
          done
          exit 1
      - run: zig build qdrant-contract --summary all
        env:
          NULLPANTRY_TEST_QDRANT_URL: http://127.0.0.1:6333

  lancedb-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install lancedb
      - run: zig build lancedb-contract --summary all
        env:
          NULLPANTRY_TEST_LANCEDB_URI: ${{ runner.temp }}/nullpantry-lancedb
          NULLPANTRY_TEST_LANCEDB_COMMAND: python

  clickhouse-contract:
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.8
        ports:
          - 8123:8123
        env:
          CLICKHOUSE_SKIP_USER_SETUP: 1
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"
      - run: |
          for i in {1..60}; do
            curl -fsS http://127.0.0.1:8123/ping && exit 0
            sleep 1
          done
          exit 1
      - run: zig build clickhouse-contract --summary all
        env:
          NULLPANTRY_TEST_CLICKHOUSE_URL: http://127.0.0.1:8123

  lucid-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"
      - run: zig build lucid-contract --summary all
